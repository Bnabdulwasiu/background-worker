# Alembic Configuration File
# This tells Alembic how to connect to the database and where migration scripts live.

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration filenames
# The format below produces: 001_create_jobs_table.py
file_template = %%(rev)s_%%(slug)s

# Don't output SQL to stdout
output_encoding = utf-8

# Database URL - this gets overridden by env.py to use our settings
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/scheduler_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
