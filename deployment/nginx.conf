server {
    listen 80;
    server_name DOMAIN_PLACEHOLDER;

    # Frontend Static Files
    location / {
        root /var/www/scheduler/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE Events Proxy (Needs buffering disabled!)
    location /api/events {
        proxy_pass http://127.0.0.1:8000/api/events;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        
        # Disable buffering and caching for real-time SSE stream
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        
        # Prevent timeout on long-lived connections
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }
}
